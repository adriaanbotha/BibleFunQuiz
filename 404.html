<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Bible Fun Quiz</title>
    <style>
        :root {
            --primary-color: #FF9800;
            --secondary-color: #FFB300;
            --text-color: #333;
            --background-color: #fff;
            --accent-color: #FFB300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 6em;
            color: var(--primary-color);
            margin-bottom: 20px;
            line-height: 1;
        }

        h2 {
            font-size: 2em;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        p {
            margin-bottom: 30px;
            font-size: 1.2em;
            color: var(--text-color);
        }

        .home-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .home-button:hover {
            transform: translateY(-3px);
            background-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 4em;
            }
            
            h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
        <a href="/" class="home-button">Return to Home</a>
    </div>
</body>
</html>
